<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>第一層</title>

<style>

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;

background:
linear-gradient(
to bottom,
#d7d8d6 0%,
#c6c7c5 35%,
#a0a19f 70%,
#696a69 100%
);

font-family:
"Hiragino Mincho ProN",
"Yu Mincho",
serif;

color:white;

transition:
filter 5s ease;
}

.fog{
position:fixed;

inset:-30%;

background:
radial-gradient(
circle,
rgba(255,255,255,.18),
transparent 65%
);

filter:blur(130px);

animation:
fogMove 26s ease-in-out infinite;

pointer-events:none;
}

.fog2{
opacity:.55;
animation-delay:-10s;
}

@keyframes fogMove{

0%{
transform:
translate(-6%,0)
scale(1);
}

50%{
transform:
translate(8%,-3%)
scale(1.18);
}

100%{
transform:
translate(-6%,0)
scale(1);
}

}

.noise{
position:fixed;

inset:0;

opacity:.025;

pointer-events:none;

background:
repeating-linear-gradient(
0deg,
white 0,
white 1px,
transparent 2px,
transparent 4px
);

mix-blend-mode:screen;
}

.container{

position:absolute;

top:50%;

left:50%;

transform:
translate(-50%,-50%);

text-align:center;

width:90%;

max-width:520px;

opacity:0;

animation:
appear 5s forwards;

z-index:5;

transition:

opacity 3.6s ease,
filter 3.8s ease;

}

@keyframes appear{

from{
opacity:0;
filter:
blur(20px);
}

to{
opacity:1;
filter:
blur(0);
}

}

.layer-title{

font-size:18px;

letter-spacing:.45em;

opacity:.68;

margin-bottom:56px;

animation:
float 12s ease-in-out infinite;

}

.question{

font-size:15px;

letter-spacing:.18em;

line-height:2;

opacity:.72;

margin-bottom:34px;

}

input{

width:80%;

max-width:320px;

padding:
12px 8px;

background:
rgba(255,255,255,.08);

border:none;

border-bottom:
1px solid rgba(255,255,255,.45);

outline:none;

font-size:16px;

text-align:center;

color:
rgba(255,255,255,.95);

font-family:
inherit;

letter-spacing:.12em;

}

input::placeholder{

color:
rgba(255,255,255,.32);

}

.enter-button{

display:block;

margin:
24px auto 0;



padding:
11px 28px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.36);

border-radius:
999px;

color:
rgba(255,255,255,.82);

font-family:
inherit;

font-size:
12px;

letter-spacing:
.28em;

cursor:
pointer;

transition:
1.1s;

box-shadow:
0 0 18px rgba(255,255,255,.08),
inset 0 0 12px rgba(255,255,255,.04);

}

.enter-button:hover{

background:
rgba(255,255,255,.15);

text-shadow:
0 0 10px rgba(255,255,255,.65),
0 0 24px rgba(255,255,255,.35);

box-shadow:
0 0 28px rgba(255,255,255,.2),
inset 0 0 16px rgba(255,255,255,.07);

}

.message{

height:32px;

margin-top:28px;

font-size:13px;

opacity:0;

filter:
blur(4px);

transition:
1.2s;

}

.message.show{

opacity:.55;

filter:
blur(.6px);

}

@keyframes float{

0%{
transform:
translateY(0);
}

50%{
transform:
translateY(-4px);
}

100%{
transform:
translateY(0);
}

}

#mist{

position:fixed;

inset:-45%;

opacity:0;

pointer-events:none;

z-index:30;

background:

radial-gradient(

circle at center,

rgba(255,255,255,.42),

rgba(255,255,255,.28) 35%,

rgba(255,255,255,.14) 65%,

transparent

);

filter:
blur(190px);

transform:
scale(.6);

transition:

opacity 4.2s ease,
transform 4.6s ease;

}

#mist.cover{

opacity:1;

transform:
scale(2);

}
@media (max-width:640px){

  .fog{
    inset:-20%;
    filter:blur(70px);
    animation:none;
  }

  #mist{
    inset:-25%;
    filter:blur(80px);
    transition:
    opacity 3.8s ease,
    transform 4s ease;
  }

  #mist.cover{
    opacity:1;
    transform:scale(1.35);
  }

}
</style>

</head>

<body>

<div class="fog"></div>
<div class="fog fog2"></div>
<div class="noise"></div>

<div
class="container"
id="container">

<div class="layer-title">

第一層

</div>

<div class="question">

草陽炎が訪れた地区の名前

</div>

<input
id="password"
type="text"
autocomplete="off"
placeholder="言葉を入力してください"
>

<button
class="enter-button"
id="enterButton"
type="button"
>
進む
</button>

<div
class="message"
id="message">

思い出せませんでした。

</div>

</div>

<div id="mist"></div>

<script>

const input=
document.getElementById(
"password"
);

const enterButton=
document.getElementById(
"enterButton"
);

const message=
document.getElementById(
"message"
);

const container=
document.getElementById(
"container"
);

const mist=
document.getElementById(
"mist"
);

let moving=false;

async function submitAnswer(){

if(
moving
){
return;
}

const value=
input.value
.trim();

try{

const response=
await fetch(
"/.netlify/functions/hint-auth",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
layer:"layer1",
password:value
})
}
);

const data=
await response.json();

if(
data.success
){

moving=true;

input.blur();

container.style.opacity=
"0";

container.style.filter=
"blur(70px)";

document.body.style.filter=
"brightness(1.08)";

mist.classList.add(
"cover"
);

setTimeout(

function(){

sessionStorage.setItem(
"hint_layer1",
"ok"
);

window.location.href=
data.redirect;

},

1800

);
}

else{

message.classList.add(
"show"
);

setTimeout(

function(){

message.classList.remove(
"show"
);

},

1800

);

}

}

catch(error){

message.classList.add(
"show"
);

setTimeout(

function(){

message.classList.remove(
"show"
);

},

1800

);

}

}

input.addEventListener(

"keydown",

function(e){

if(
e.isComposing ||
e.keyCode===229
){
return;
}

if(
e.key==="Enter"
){

e.preventDefault();

submitAnswer();

}

}

);

enterButton.addEventListener(

"click",

function(){

submitAnswer();

}

);

</script>

</body>
</html>
