<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>最終層</title>

<style>

html, body{

margin:0;

width:100%;
height:100%;

overflow:hidden;

background:

linear-gradient(

to bottom,

#4b4c4d 0%,

#2b2c2e 32%,

#121416 68%,

#030405 100%

);

font-family:

"Hiragino Mincho ProN",
"Yu Mincho",
serif;

color:white;

transition:

filter 5s ease;

}

/* 背景霧 */

.fog{

position:fixed;

inset:-40%;

background:

radial-gradient(

circle,

rgba(255,255,255,.045),

transparent 74%

);

filter:

blur(190px);

animation:

fogMove 36s ease-in-out infinite;

pointer-events:none;

}

.fog2{

animation-delay:-16s;

opacity:.32;

}

@keyframes fogMove{

0%{

transform:

translate(-8%,0)
scale(1);

}

50%{

transform:

translate(5%,-4%)
scale(1.1);

}

100%{

transform:

translate(-8%,0)
scale(1);

}

}

.noise{

position:fixed;

inset:0;

opacity:.015;

pointer-events:none;

background:

repeating-linear-gradient(

0deg,

white 0,

white 1px,

transparent 2px,

transparent 4px

);

mix-blend-mode:screen;

}

/* 本体 */

.container{

position:absolute;

top:50%;

left:50%;

transform:

translate(-50%,-50%);

text-align:center;

opacity:0;

animation:

appear 7s forwards;

width:90%;

max-width:520px;

z-index:5;

transition:

opacity 3.6s ease,
filter 3.8s ease;

}

@keyframes appear{

from{

opacity:0;

filter:
blur(34px);

}

to{

opacity:1;

filter:
blur(0);

}

}

.layer-title{

font-size:18px;

letter-spacing:.45em;

opacity:.34;

margin-bottom:62px;

animation:

float 17s ease-in-out infinite;

}

.question{

font-size:15px;

letter-spacing:.18em;

line-height:2;

opacity:.52;

margin-bottom:40px;

}

input{

width:80%;

max-width:320px;

background:

rgba(255,255,255,.025);

border:none;

border-bottom:

1px solid rgba(255,255,255,.2);

outline:none;

color:

rgba(255,255,255,.88);

font-size:16px;

letter-spacing:.12em;

text-align:center;

padding:

12px 8px;

font-family:

inherit;

}

input::placeholder{

color:

rgba(255,255,255,.18);

}

.message{

height:32px;

margin-top:32px;

font-size:13px;

opacity:0;

transition:

1.7s;

filter:

blur(6px);

}

.message.show{

opacity:.34;

filter:

blur(.8px);

}

@keyframes float{

0%{
transform:
translateY(0);
}

50%{
transform:
translateY(-3px);
}

100%{
transform:
translateY(0);
}

}

/* 遷移霧 */

#mist{

position:fixed;

inset:-45%;

opacity:0;

pointer-events:none;

z-index:30;

background:

radial-gradient(

circle at center,

rgba(255,255,255,.34) 0%,

rgba(255,255,255,.20) 35%,

rgba(255,255,255,.10) 65%,

transparent

);

filter:

blur(210px);

transform:

scale(.6);

transition:

opacity 4.2s ease,
transform 4.6s ease;

}

#mist.cover{

opacity:1;

transform:

scale(2);

}

</style>

</head>

<body>

<div class="fog"></div>

<div class="fog fog2"></div>

<div class="noise"></div>

<div
class="container"
id="container">

<div class="layer-title">

最終層

</div>

<div class="question">

始まりとなった少年の名前

</div>

<input
id="password"
type="text"
autocomplete="off"
placeholder="言葉を入力してください"
>

<div
class="message"
id="message">

思い出せませんでした。

</div>

</div>

<div id="mist"></div>

<script>

const input=
document.getElementById(
"password"
);

const message=
document.getElementById(
"message"
);

const container=
document.getElementById(
"container"
);

const mist=
document.getElementById(
"mist"
);

let moving=false;

input.addEventListener(

"keydown",

async function(e){

if(
e.isComposing ||
e.keyCode===229
){
return;
}

if(
moving
){
return;
}

if(
e.key==="Enter"
){

e.preventDefault();

const value=
input.value
.trim();

try{

const response=
await fetch(
"/.netlify/functions/hint-auth",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
layer:"layer4",
password:value
})
}
);

const data=
await response.json();

if(
data.success
){

moving=true;

input.blur();

container.style.opacity=
"0";

container.style.filter=
"blur(70px)";

document.body.style.filter=
"brightness(1.08)";

mist.classList.add(
"cover"
);

setTimeout(

function(){

sessionStorage.setItem(
"hint_layer4",
"ok"
);

window.location.href=
data.redirect;

},

4400

);

}

else{

message.classList.add(
"show"
);

setTimeout(

function(){

message.classList.remove(
"show"
);

},

1800

);

}

}

catch(error){

message.classList.add(
"show"
);

setTimeout(

function(){

message.classList.remove(
"show"
);

},

1800

);

}

}

}

);

</script>

</body>
</html>
