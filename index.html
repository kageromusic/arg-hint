<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>hint</title>

<style>

html, body{
margin:0;
width:100%;
height:100%;
overflow:hidden;

background:
linear-gradient(
to bottom,
#d7d8d6 0%,
#c6c7c5 22%,
#a9aaa8 48%,
#6d6e6d 74%,
#202124 100%
);

font-family:
"Hiragino Mincho ProN",
"Yu Mincho",
serif;

color:white;
}

/*  */

.fog{
position:fixed;
inset:-30%;

background:
radial-gradient(
circle,
rgba(255,255,255,0.18),
transparent 65%
);

filter:blur(130px);

animation:
fogMove 26s ease-in-out infinite;

pointer-events:none;
}

.fog2{
animation-delay:-10s;
opacity:.55;
}

@keyframes fogMove{

0%{
transform:
translate(-6%,0)
scale(1);
}

50%{
transform:
translate(8%,-3%)
scale(1.18);
}

100%{
transform:
translate(-6%,0)
scale(1);
}

}

/*  */

.message{
position:absolute;
top:42%;
left:50%;

transform:
translate(-50%,-50%);

text-align:center;

line-height:2.2;

font-size:15px;

letter-spacing:.2em;

opacity:0;

animation:
messageAppear 13s forwards;

white-space:nowrap;
}

@keyframes messageAppear{

0%{
opacity:0;
filter:
blur(18px);
}

20%{
opacity:.55;
filter:
blur(2px);
}

60%{
opacity:.72;
filter:
blur(.6px);
}

100%{
opacity:0;
filter:
blur(22px);
}

}

/*  */

.layers{
position:absolute;

top:54%;
left:50%;

transform:
translate(-50%,-50%);

display:flex;

flex-direction:column;

gap:30px;

opacity:0;

animation:
layerAppear 5s forwards;

animation-delay:8.5s;
}

@keyframes layerAppear{

from{
opacity:0;
filter:blur(22px);
}

to{
opacity:1;
filter:blur(0);
}

}

.layer{
font-size:19px;

letter-spacing:.45em;

cursor:pointer;

text-align:center;

opacity:.55;

text-decoration:none;

color:
rgba(255,255,255,.9);

position:relative;

animation:
float 12s ease-in-out infinite,
flicker 8s infinite;

transition:
opacity 1.2s ease,
filter 1.2s ease,
transform 1.2s ease;
}

.layer:hover{
opacity:.95;

filter:
blur(.2px);

transform:
scale(1.025);
}

.layer:nth-child(2){
animation-delay:-2s;
opacity:.48;
}

.layer:nth-child(3){
animation-delay:-4s;
opacity:.40;
}

.layer:nth-child(4){
animation-delay:-7s;
opacity:.32;

color:
rgba(255,255,255,.72);

filter:
blur(.4px);
}

@keyframes float{

0%{
transform:
translateY(0px);
}

50%{
transform:
translateY(-4px);
}

100%{
transform:
translateY(0px);
}

}

@keyframes flicker{

0%{
text-shadow:
0 0 4px rgba(255,255,255,.12);
}

50%{
text-shadow:
0 0 15px rgba(255,255,255,.28);
}

100%{
text-shadow:
0 0 4px rgba(255,255,255,.12);
}

}

/*  */

.noise{
position:fixed;

inset:0;

opacity:.025;

pointer-events:none;

background:
repeating-linear-gradient(
0deg,
white 0,
white 1px,
transparent 2px,
transparent 4px
);

mix-blend-mode:screen;
}

</style>
</head>

<body>

<div class="fog"></div>
<div class="fog fog2"></div>
<div class="noise"></div>

<div class="message">
彼は、そこにいてはいけない人
</div>

<div class="layers">

<a class="layer" href="layer1.html">第一層</a>

<a class="layer" href="layer2.html">第二層</a>

<a class="layer" href="layer3.html">第三層</a>

<a class="layer" href="layer4.html">最終層</a>

</div>

</body>
</html>
